<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreambike Tracker</title>

<style>
body {
    font-family: Arial;
    background: #F9CF00;
    text-align: center;
}

.logo {
    width: 260px;
    margin-top: 40px;
}

.info {
    margin-top: 10px;
    font-weight: bold;
}

h2 {
    margin-top: 25px;
}

input {
    width: 300px;
    padding: 12px;
    border: 2px solid black;
    text-align: center;
    margin-top: 10px;
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    background: orange;
    border: none;
    color: white;
    font-weight: bold;
}

.result {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}
</style>
</head>

<body>

<img src="{{ url_for('static', filename='logo.png') }}" class="logo">

<div class="info">
You can search using <b>Plate Number</b> OR <b>4-digit Engine (ORCR)</b>
</div>

<form method="POST">

<h2>PLATE TRACKER</h2>
<input type="text" name="plate" placeholder="INSERT PLATE NUMBER">

<h2>ORCR TRACKER</h2>
<input type="text" name="engine" placeholder="INSERT 4 DIGIT ENGINE NUMBER">

<br>
<button type="submit">SEARCH</button>

</form>

<div class="result">
{% if message == "Not Available" %}
<p style="color: red;">Not Available</p>

{% elif message == "Transfer of Ownership is still in process." %}
<p style="color: red;">Transfer of Ownership is still in process.</p>
{% endif %}
</div>

</body>
</html>
