<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Available</title>

<style>
body {
    text-align: center;
    font-family: Arial;
    background: #F9CF00;
    margin: 0;
}

.logo {
    width: 400px;
    max-width: 80%;
    height: auto;
    margin-top: 30px;
}

.title {
    font-size: 28px;
    font-weight: bold;
    margin-top: 20px;
}

.message {
    margin-top: 15px;
    font-size: 16px;
}

.btn {
    margin-top: 20px;
    padding: 15px 40px;
    background: orange;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

/* 🎉 smooth fade-in */
.fade {
    animation: fadeIn 0.6s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body class="fade">

<img src="{{ url_for('static', filename='logo.png') }}" class="logo">

<div class="title">{{ title }} 🎉</div>

<div class="message">
Congratulations! Your record is available.<br>
Please message us to claim.
</div>

<a href="https://www.facebook.com/profile.php?id=61560025200629" target="_blank">
<button class="btn">SEND MESSAGE</button>
</a>

<br><br>

<a href="/">
<button class="btn">SEARCH AGAIN</button>
</a>

<!-- 🎉 CONFETTI SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
window.onload = function () {

    // 🎉 BIG BURST
    confetti({
        particleCount: 150,
        spread: 100,
        origin: { y: 0.6 }
    });

    // 🎉 SIDE CONFETTI
    const duration = 3 * 1000;
    const end = Date.now() + duration;

    (function frame() {
        confetti({
            particleCount: 6,
            angle: 60,
            spread: 55,
            origin: { x: 0 }
        });

        confetti({
            particleCount: 6,
            angle: 120,
            spread: 55,
            origin: { x: 1 }
        });

        if (Date.now() < end) {
            requestAnimationFrame(frame);
        }
    })();
};
</script>

</body>
</html>
