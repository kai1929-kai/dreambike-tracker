<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Available</title>

<style>
body {
    text-align: center;
    font-family: Arial;
    background: #F9CF00;
}

.logo {
    width: 300px;
    margin-top: 30px;
}

.title {
    font-size: 28px;
    font-weight: bold;
    margin-top: 20px;
}

.message {
    margin-top: 15px;
}

.btn {
    margin-top: 20px;
    padding: 15px 40px;
    background: orange;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<img src="{{ url_for('static', filename='logo.png') }}" class="logo">

<div class="title">{{ title }} 🎉</div>

<div class="message">
Congratulations! Your record is available.<br>
Please message us to claim.
</div>

<a href="https://www.facebook.com/profile.php?id=61560025200629" target="_blank">
<button class="btn">SEND MESSAGE</button>
</a>

<br><br>

<a href="/">
<button class="btn">SEARCH AGAIN</button>
</a>

<!-- 🎉 CONFETTI -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
window.onload = function () {
    confetti({
        particleCount: 150,
        spread: 100,
        origin: { y: 0.6 }
    });
};
</script>

</body>
</html>
